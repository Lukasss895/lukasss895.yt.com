<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Môj YouTube Kanál</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #181818; /* Tmavé pozadie ako na YT */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background-color: #212121;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            margin-bottom: 20px;
        }
        .sub-button {
            background-color: #ff0000; /* YouTube červená */
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 30px;
            transition: background 0.3s;
            display: inline-block;
        }
        .sub-button:hover {
            background-color: #cc0000;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Vitaj na mojom kanáli!</h1>
        <p>Ak sa ti páči moja tvorba, neváhaj ma podporiť.</p>
        <br>
        <a href="https://www.youtube.com/@Lukasss895?sub_confirmation=1" class="sub-button" target="_blank">
            ODOBERAŤ
        </a>
    </div>

</body>
</html>
